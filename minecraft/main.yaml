apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-main
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server-main
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: server-main
    spec:
      nodeSelector:
        kubernetes.io/hostname: wk-02
      containers:
        - name: minecraft
          image: itzg/minecraft-server:java21
          resources:
            requests:
              memory: "4Gi"
          env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: "PAPER"
            - name: VERSION
              value: "LATEST"
            - name: MEMORY
              value: "4G"
          ports:
            - containerPort: 25565
              name: minecraft
          volumeMounts:
            - name: server-data
              mountPath: /data
        - name: playit
          image: dysta/playitgg:latest
          env:
            - name: PLAYIT_SECRET_KEY
              value: "YOUR_SECRET_KEY"
          volumeMounts:
            - name: playit-config
              mountPath: /secrets
      volumes:
        - name: playit-config
          hostPath:
            path: /srv/playit
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: server-main-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app: server-main
  ports:
    - port: 25565
      targetPort: 25565
      nodePort: 30065
