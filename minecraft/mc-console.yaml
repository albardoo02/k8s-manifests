apiVersion: apps/v1
kind: Deployment
metadata:
  name: mc-console
spec:
  selector:
    matchLabels:
      app: mc-console
  template:
    metadata:
      labels:
        app: mc-console
    spec:
      containers:
      - name: web-rcon
        image: itzg/rcon-cli:latest
        ports:
        - containerPort: 4321
---
apiVersion: v1
kind: Service
metadata:
  name: mc-console-svc
spec:
  selector:
    app: mc-console
  ports:
    - port: 80
      targetPort: 4321
