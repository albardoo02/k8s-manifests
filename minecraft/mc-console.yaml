apiVersion: apps/v1
kind: Deployment
metadata:
  name: mc-console
spec:
  selector:
    matchLabels:
      app: mc-console
  template:
    metadata:
      labels:
        app: mc-console
    spec:
    containers:
      - name: web-rcon
        image: itzg/rcon-cli:latest
        env:
          - name: RCON_HOST
            value: "server-main-svc"
          - name: RCON_PORT
            value: "25575"
          - name: RCON_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mc-secrets
                key: rcon-password
        ports:
        - containerPort: 4321
---
apiVersion: v1
kind: Service
metadata:
  name: mc-console-svc
spec:
  selector:
    app: mc-console
  ports:
    - port: 80
      targetPort: 4321
